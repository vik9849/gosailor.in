# ─────────────────────────────────────────────────────────────
# GoSailor.in — netlify.toml
# ─────────────────────────────────────────────────────────────

[build]
  publish = "."        # root of your repo is the site root
  command = ""         # no build command — pure static HTML

# ── CMS Auth redirect ─────────────────────────────────────────
# Required for Netlify Identity to redirect back after login
[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

# ── Cache Headers ─────────────────────────────────────────────

# HTML — short cache so updates show immediately
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Blog HTML pages
[[headers]]
  for = "/blog/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# CSS + JS — cache for a week
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# Uploaded images — cache for a year
[[headers]]
  for = "/images/uploads/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# General images
[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

# Fonts
[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# sitemap + robots — short cache
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# Admin panel — never cache
[[headers]]
  for = "/admin/*"
  [headers.values]
    Cache-Control = "no-store, no-cache"

# ── Security Headers ──────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"